spring:
  application:
    name: np-shop
  jpa:
    hibernate:
      ddl-auto: update
  profiles:
    active: dev
  messages:
    basename: messages
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration : ${JWT_TOKEN_EXPIRATION}
base:
  api: /api/v1
paypal:
  return-url : ${PAYPAL_RETURN_URL}
  cancel-url : ${PAYPAL_CANCEL_URL}
  client:
    id: ${PAYPAL_CLIENT_ID}
    secret: ${PAYPAL_CLIENT_SECRET}
  webhook:
    id: ${PAYPAL_WEBHOOK_ID}
  sandbox: ${PAYPAL_IS_SANDBOX}